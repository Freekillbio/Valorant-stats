name: Update Valorant Widget

on:
  schedule:
    # This instructs GitHub to run your script automatically every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # This adds a manual "Run Workflow" button inside your GitHub dashboard

jobs:
  update-widget:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Execute Update Script
      env:
        # Pushes your hidden GitHub secrets directly into the code safely
        VAL_API_KEY: ${{ secrets.VAL_API_KEY }}
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      run: python update_stats.py
